<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>docsify-sidebar-scroll-to-active — demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live demo of docsify-sidebar-scroll-to-active." />
    <link rel="stylesheet" href="https://unpkg.com/docsify/lib/themes/vue.css" />
  </head>
  <body>
    <div id="app">Loading…</div>
    <script>
      window.$docsify = {
        name: "docsify-sidebar-scroll-to-active",
        repo: "piecioshka/docsify-sidebar-scroll-to-active",
        loadSidebar: true,
        subMaxLevel: 0,
        homepage: "intro.md",
        alias: {
          "/.*/_sidebar.md": "/demo/_sidebar.md",
        },
      };
    </script>
    <script src="https://unpkg.com/docsify/lib/docsify.min.js"></script>
    <script src="../index.js"></script>
  </body>
</html>
